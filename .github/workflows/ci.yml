name: URHYNIX CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  # в”Җв”Җв”Җ Job 1: мӢңнҒ¬лҰҝ м җкІҖ (лӘЁл“  PR) в”Җв”Җв”Җ
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run secret-scan
        run: |
          chmod +x .claude/skills/secret-scan/scan.sh
          bash .claude/skills/secret-scan/scan.sh

  # в”Җв”Җв”Җ Job 2: л¬ём„ң м •н•©м„ұ л№ лҘё мІҙнҒ¬ в”Җв”Җв”Җ
  doc-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check HARNESS-MANIFEST required_files мЎҙмһ¬
        run: |
          python3 - <<'PY'
          import yaml, sys, pathlib
          m = yaml.safe_load(open("HARNESS-MANIFEST.yaml"))
          missing = [f for f in m.get("required_files", []) if not pathlib.Path(f).exists()]
          if missing:
              print("вқҢ лҲ„лқҪлҗң required_files:")
              for f in missing: print(f"  - {f}")
              sys.exit(1)
          print(f"вң… {len(m.get('required_files', []))}к°ң required_files лӘЁл‘җ мЎҙмһ¬")
          PY
      - name: CONTRACT.md ліҖкІҪ к°•м ң (ROS msg / DB schema / Unity bridge мҳҒм—ӯ)
        if: github.event_name == 'pull_request'
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          NEEDS_CONTRACT=$(echo "$CHANGED" | grep -E "ros-ws/.*\.msg|backend/db/migrations|unity-src/Assets/Scripts/Network" || true)
          CONTRACT_TOUCHED=$(echo "$CHANGED" | grep "docs/ref/CONTRACT.md" || true)
          if [[ -n "$NEEDS_CONTRACT" && -z "$CONTRACT_TOUCHED" ]]; then
            echo "вқҢ ROS msg/DB migration/Unity bridge ліҖкІҪлҗҗлҠ”лҚ° CONTRACT.mdлҠ” м•Ҳ кұҙл“ңлҰј"
            echo "ліҖкІҪ нҢҢмқј:"
            echo "$NEEDS_CONTRACT"
            echo ""
            echo "вҶ’ docs/ref/CONTRACT.md лҸ„ к°ҷмқҙ мҲҳм •н•ҙм„ң PRм—җ нҸ¬н•Ён•ҙмЈјм„ёмҡ”."
            exit 1
          fi
          echo "вң… CONTRACT лҸҷмӢң к°ұмӢ  лЈ° нҶөкіј"

  # в”Җв”Җв”Җ Job 3: ROS colcon build (ros-ws ліҖкІҪ мӢң) в”Җв”Җв”Җ
  ros-build:
    runs-on: ubuntu-latest
    container:
      image: ros:humble
    if: contains(github.event.pull_request.changed_files, 'ros-ws/') || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: colcon build
        working-directory: ros-ws
        shell: bash
        run: |
          if [ ! -d "src" ]; then
            echo "ros-ws/src м—ҶмқҢ вҖ” skip (Sprint 2 м§„мһ… м „)"
            exit 0
          fi
          source /opt/ros/humble/setup.bash
          apt-get update && apt-get install -y python3-colcon-common-extensions
          colcon build --event-handlers console_direct+ || true
          # мІ« sprintлҠ” мӢӨнҢЁн•ҙлҸ„ нҶөкіј (Sprint 2 м§„мһ… нӣ„ || true м ңкұ°)

  # в”Җв”Җв”Җ Job 4: Unity м»ҙнҢҢмқј мІҙнҒ¬ (м„ нғқ, лқјмқҙм„ мҠӨ н•„мҡ”) в”Җв”Җв”Җ
  # unity-build:
  #   runs-on: ubuntu-latest
  #   if: contains(github.event.pull_request.changed_files, 'unity-src/')
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Unity Test (Editor)
  #       uses: game-ci/unity-test-runner@v4
  #       env:
  #         UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
  #       with:
  #         projectPath: unity-src
  #         testMode: editmode
  # вҶ’ Unity Personal лқјмқҙм„ мҠӨ н•„мҡ”. нҷңм„ұнҷ”н•ҳл Өл©ҙ GitHub Secretsм—җ UNITY_LICENSE м¶”к°Җ.
